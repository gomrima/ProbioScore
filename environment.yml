name: probioscore-i45
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - numpy>=1.24
  - pandas>=2.0
  - openpyxl>=3.1
  - matplotlib>=3.7
  - pip:
      - .
# Reference conda environment for ProbioScore I45 portable.
#
# Usage:
#   conda env create -f environment.yml
#   conda activate probioscore-i45
#
# Notes:
#   The pip section installs the local package using pyproject.toml at the
#   repository root, exposing the `probioscore` console entry point.
